<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <title>Controle do NAO Robot</title>
        <style>
        :root {
            --primary-color: #007bff;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.8rem;
            text-align: center;
        }
        button {
            background-color: white;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 15px 10px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-transform: capitalize;
            margin: auto;
        }
        input{
            text-align: center;
            border-radius: 5px;
            border: 1px solid var(--primary-color);
            padding: 5%;
            margin-top: 2%;
            margin-bottom: 2%;
        }

        button:active {
            transform: scale(0.95);
            background-color: var(--primary-color);
            color: white;
        }
         #status {
            margin-top: 30px;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .sucesso { background-color: #d4edda; color: #155724; display: block !important; }
        .erro { background-color: #f8d7da; color: #721c24; display: block !important; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
        }
        .say{
            padding: 5%;
            border: 2px solid var(--primary-color);
            border-radius: 10px;
        }
        .bt{
            display: flex;
            justify-content: center; /* Centraliza horizontalmente */
            margin: 0 auto;
            text-align: center;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        </style>
    </head>
        <body>
            <div class="say">
                <h1>Falar</h1>
                <input type="text" id="textoFala" placeholder="Digite o texto para o NAO falar"><br>
                <button class="bt" onclick="enviarFala()">Falar</button>
            </div>
            <div id="status"></div>

            <script>
                function enviarFala(){
                const statusDiv = document.getElementById('status');
            
                // Feedback visual de carregamento
                statusDiv.className = '';
                statusDiv.innerHTML = '<div class="loader"></div> Executando fala';
                statusDiv.style.display = 'block';
                    let txt = document.getElementById('textoFala').value
                    fetch('/falar', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({texto: txt})
                    })
                    .then(response => response.json())
                    .then(data => {
                    if (data.status === "sucesso") {
                        statusDiv.className = 'sucesso';
                        statusDiv.innerHTML = "✅ Sucesso: O NAO executou a fala";
                    } else {
                        statusDiv.className = 'erro';
                        statusDiv.innerHTML = "❌ Erro: ";
                    }
                    
                    // Esconde a mensagem após 3 segundos
                    setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
                    })
                    .catch(error => {
                    statusDiv.className = 'erro';
                    statusDiv.innerHTML = "❌ Falha de comunicação com o servidor.";
                    console.error('Erro:', error);
                });
                }
            </script>
        </body>
</html>
